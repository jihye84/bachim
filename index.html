<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>받침이 빙글빙글</title>

    <!-- [핵심] 카카오톡 인앱 브라우저 외부로 빼내기 스크립트 -->
    <script>
        (function () {
            var userAgent = navigator.userAgent.toLowerCase();
            var targetUrl = location.href;

            if (userAgent.indexOf("kakaotalk") > -1) {
                if (userAgent.indexOf("android") > -1) {
                    // 안드로이드: 크롬 브라우저로 강제 이동
                    location.href = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
                } else if (userAgent.indexOf("iphone") > -1 || userAgent.indexOf("ipad") > -1) {
                    // 아이폰(iOS): 강제 이동이 막혀 있어 안내창 띄우기
                    alert("카카오톡 브라우저에서는 소리가 나지 않거나 오류가 날 수 있습니다.\n\n화면 우측 하단의 🧭(나침반) 아이콘을 눌러 Safari(사파리)에서 열어주세요!");
                }
            }
        })();
    </script>
    <!-- 스크립트 끝 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .spin-transition {
            transition: transform 0.15s cubic-bezier(0.25, 0.1, 0.15, 1);
        }

        #roulette-container {
            touch-action: none;
            cursor: grab;
        }

        #roulette-container:active {
            cursor: grabbing;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
                color: #059669;
            }

            100% {
                transform: scale(1);
            }
        }

        .animate-pop {
            animation: pop 0.5s ease-out forwards;
        }
    </style>
</head>

<body class="w-screen h-screen bg-sky-100 flex flex-col items-center justify-center touch-manipulation overflow-hidden">

    <!-- 토글 버튼 (화면 오른쪽 맨 아래 구석 고정) -->
    <div class="fixed bottom-4 right-4 z-50 flex items-center gap-2 bg-white/95 backdrop-blur-md px-4 py-2 rounded-full shadow-lg border-2 border-blue-200 cursor-pointer active:scale-95 transition-transform hover:shadow-blue-300"
        onclick="toggleMode()">
        <span id="label-8"
            class="text-base font-bold text-blue-600 transition-colors duration-300 drop-shadow-sm">기본(8개)</span>
        <div class="relative w-12 h-6 bg-gray-300 rounded-full overflow-hidden transition-colors duration-300 shadow-inner"
            id="toggle-bg">
            <div id="toggle-circle"
                class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow-md transition-transform duration-300 transform translate-x-0">
            </div>
        </div>
        <span id="label-14" class="text-base font-bold text-gray-400 transition-colors duration-300">전체(14개)</span>
    </div>

    <!-- 중앙 콘텐츠 래퍼 -->
    <div id="app-wrapper" class="relative flex flex-col items-center origin-center w-[1100px] transition-transform">

        <div id="roulette-container"
            class="relative w-[960px] h-[480px] overflow-hidden rounded-b-full shadow-[0_30px_50px_rgba(0,0,0,0.15)]">

            <div id="wheel"
                class="absolute w-[960px] h-[960px] bg-[#FFD700] rounded-full left-0 top-[-480px] flex justify-center border-[30px] border-yellow-400">
                <!-- 받침 글자들 -->
            </div>

            <div
                class="absolute w-[480px] h-[480px] bg-white rounded-full left-[240px] top-[-240px] shadow-2xl z-10 border-[16px] border-white flex flex-col justify-end items-center pb-0">
                <div class="flex items-center space-x-6 translate-y-6">
                    <!-- 왼쪽 꺾쇠 화살표 -->
                    <button onclick="changeBase(-1)"
                        class="p-2 text-gray-300 hover:text-blue-500 active:scale-90 transition z-40">
                        <svg class="w-[5rem] h-[5rem]" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>

                    <!-- 기본 글자 입력칸 -->
                    <input type="text" id="base-letter" value="아" maxlength="1"
                        class="w-[200px] text-center text-[10rem] text-black font-black bg-transparent outline-none border-b-[8px] border-transparent focus:border-blue-400 caret-blue-500 z-40 leading-none pb-0">

                    <!-- 오른쪽 꺾쇠 화살표 -->
                    <button onclick="changeBase(1)"
                        class="p-2 text-gray-300 hover:text-blue-500 active:scale-90 transition z-40">
                        <svg class="w-[5rem] h-[5rem]" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div
                class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 text-red-600 text-[5rem] drop-shadow-xl pointer-events-none">
                ▲
            </div>
        </div>

        <p id="instruction"
            class="mt-12 text-4xl text-gray-700 bg-white px-12 py-6 rounded-full shadow-lg animate-bounce text-center transition-opacity leading-snug font-bold">
            👆 룰렛을 잡고 살살 돌려보세요!<br>
            <span class="text-2xl text-gray-500 font-medium">(글자 입력칸을 터치하면 자판도 열려요)</span>
        </p>

        <!-- 결과 글자 표시 영역 -->
        <div class="mt-10 flex flex-col items-center">
            <div id="result-box-container" onclick="speakResult()"
                class="relative w-[300px] h-[300px] bg-white rounded-[3rem] shadow-xl flex items-center justify-center border-[10px] border-blue-400 text-gray-800 transition-all font-black cursor-pointer hover:bg-blue-50 active:scale-95">
                <span id="result-box" class="text-[12rem] leading-none mb-4">?</span>
                <span id="sound-hint"
                    class="absolute bottom-4 right-5 text-4xl opacity-30 transition-opacity pointer-events-none">🔊</span>
            </div>
        </div>
    </div>

    <script>
        // --- 목소리(Voices) 비동기 로딩 대기 ---
        let availableVoices = [];
        window.speechSynthesis.onvoiceschanged = () => {
            availableVoices = window.speechSynthesis.getVoices();
        };

        // --- 화면 크기 자동 조절 ---
        function autoScaleApp() {
            const wrapper = document.getElementById('app-wrapper');
            const targetWidth = 1100;
            const targetHeight = 1000;

            const currentWidth = window.innerWidth;
            const currentHeight = window.innerHeight;

            const scaleW = currentWidth / targetWidth;
            const scaleH = currentHeight / targetHeight;

            const finalScale = Math.min(scaleW, scaleH) * 0.95;

            wrapper.style.transform = `scale(${finalScale})`;
        }

        window.addEventListener('resize', autoScaleApp);
        window.addEventListener('orientationchange', autoScaleApp);
        window.onload = autoScaleApp;
        autoScaleApp();

        // --- 데이터 정의 ---
        // 8개 모드
        const consonants8 = [
            { char: 'ㄱ', offset: 1 }, { char: 'ㄴ', offset: 4 },
            { char: 'ㄷ', offset: 7 }, { char: 'ㄹ', offset: 8 },
            { char: 'ㅁ', offset: 16 }, { char: 'ㅂ', offset: 17 },
            { char: 'ㅅ', offset: 19 }, { char: 'ㅇ', offset: 21 }
        ];

        // 14개 모드
        const consonants14 = [
            { char: 'ㄱ', offset: 1 }, { char: 'ㄴ', offset: 4 },
            { char: 'ㄷ', offset: 7 }, { char: 'ㄹ', offset: 8 },
            { char: 'ㅁ', offset: 16 }, { char: 'ㅂ', offset: 17 },
            { char: 'ㅅ', offset: 19 }, { char: 'ㅇ', offset: 21 },
            { char: 'ㅈ', offset: 22 }, { char: 'ㅊ', offset: 23 },
            { char: 'ㅋ', offset: 24 }, { char: 'ㅌ', offset: 25 },
            { char: 'ㅍ', offset: 26 }, { char: 'ㅎ', offset: 27 }
        ];

        // --- 상태 변수 ---
        let isMode14 = false;
        let activeConsonants = consonants8;
        let angleStep = 360 / activeConsonants.length;

        let currentAngle = 0;
        let finalCharResult = '';

        let isDragging = false;
        let centerX = 0;
        let centerY = 0;
        let lastPointerAngle = 0;
        let lastTickAngle = 0;

        const container = document.getElementById('roulette-container');
        const wheelEl = document.getElementById('wheel');
        const baseInputEl = document.getElementById('base-letter');
        const resultBox = document.getElementById('result-box');
        const resultBoxContainer = document.getElementById('result-box-container');
        const soundHint = document.getElementById('sound-hint');
        const instruction = document.getElementById('instruction');

        // --- 토글 스위치 동작 함수 ---
        function toggleMode() {
            if (isDragging) return;

            isMode14 = !isMode14;
            activeConsonants = isMode14 ? consonants14 : consonants8;
            angleStep = 360 / activeConsonants.length;

            const bg = document.getElementById('toggle-bg');
            const circle = document.getElementById('toggle-circle');
            const l8 = document.getElementById('label-8');
            const l14 = document.getElementById('label-14');

            if (isMode14) {
                bg.classList.replace('bg-gray-300', 'bg-blue-500');
                circle.classList.replace('translate-x-0', 'translate-x-6');
                l8.classList.replace('text-blue-600', 'text-gray-400');
                l14.classList.replace('text-gray-400', 'text-blue-600');
            } else {
                bg.classList.replace('bg-blue-500', 'bg-gray-300');
                circle.classList.replace('translate-x-6', 'translate-x-0');
                l8.classList.replace('text-gray-400', 'text-blue-600');
                l14.classList.replace('text-blue-600', 'text-gray-400');
            }

            wheelEl.classList.remove('spin-transition');
            currentAngle = 0;
            lastTickAngle = 0;
            wheelEl.style.transform = `rotate(0deg)`;

            initWheel();
        }

        // --- TTS 엔진 초기화 및 웹 오디오 API ---
        let ttsUnlocked = false;
        let currentUtterance = null;
        let audioCtx = null;

        document.body.addEventListener('pointerdown', () => {
            if (!ttsUnlocked) {
                let warmupUtterance = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(warmupUtterance);
                window.speechSynthesis.cancel();

                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                availableVoices = window.speechSynthesis.getVoices();
                ttsUnlocked = true;
            }
        }, { once: true, capture: true });

        // --- 톱니바퀴 효과음 발생 함수 ---
        function playTickSound() {
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.05);

            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // --- 룰렛 초기화 및 그리기 ---
        function initWheel() {
            wheelEl.innerHTML = '';

            activeConsonants.forEach((cons, index) => {
                const angle = index * angleStep;
                const letterDiv = document.createElement('div');

                const paddingClass = isMode14 ? 'pb-[6rem]' : 'pb-[2rem]';

                letterDiv.className = `absolute w-full h-full left-0 top-0 flex flex-col justify-end items-center ${paddingClass} pointer-events-none transition-all`;
                letterDiv.style.transform = `rotate(${angle}deg)`;

                const fontSize = isMode14 ? 'text-[6.5rem]' : 'text-[9rem]';
                const span = document.createElement('span');
                span.className = `text-[#059669] font-black ${fontSize} drop-shadow-sm transition-all`;
                span.innerText = cons.char;

                letterDiv.appendChild(span);
                wheelEl.appendChild(letterDiv);
            });

            calculateResult(true);
        }

        // --- [신규 구현] 초성 변경 (자음 교체 마법) 로직 ---
        function changeBase(direction) {
            let selBaseChar = baseInputEl.value;
            if (!selBaseChar) selBaseChar = '아';

            let baseCode = selBaseChar.charCodeAt(0);

            // 한글 음절(가~힣)이 아니면 무조건 '아'로 강제 설정
            if (baseCode < 44032 || baseCode > 55203) {
                baseCode = '아'.charCodeAt(0);
            }

            // 입력된 글자에서 초성 인덱스와 중성(모음) 인덱스를 완벽히 분리해냅니다.
            // (종성(받침)은 무시하여 다음 글자로 넘어갈 때 순수한 기본 글자로 셋팅되게 합니다)
            let choIndex = Math.floor((baseCode - 44032) / (21 * 28));
            let jungIndex = Math.floor(((baseCode - 44032) % (21 * 28)) / 28);

            // 14개 기본 자음의 한글 유니코드 초성 인덱스: ㄱ(0) ~ ㅎ(18)
            const basicChoIndices = [0, 2, 3, 5, 6, 7, 9, 11, 12, 14, 15, 16, 17, 18];

            let currentBasicIdx = basicChoIndices.indexOf(choIndex);
            // 만약 사용자가 '뽀'처럼 쌍자음을 쳤다면, 안전하게 'ㄱ' 계열로 돌려보냅니다.
            if (currentBasicIdx === -1) {
                currentBasicIdx = 0;
            }

            // 방향(왼쪽 -1, 오른쪽 +1)에 따라 14개 자음을 순환합니다.
            currentBasicIdx += direction;
            if (currentBasicIdx < 0) currentBasicIdx = basicChoIndices.length - 1;
            if (currentBasicIdx >= basicChoIndices.length) currentBasicIdx = 0;

            let newChoIndex = basicChoIndices[currentBasicIdx];

            // 새로운 글자 합성 = (새로운 초성) + (기존에 사용자가 썼던 중성/모음) + (종성 0=받침없음)
            let newCharCode = 44032 + (newChoIndex * 21 * 28) + (jungIndex * 28);

            baseInputEl.value = String.fromCharCode(newCharCode);
            calculateResult(true);
        }

        baseInputEl.addEventListener('input', (e) => {
            let val = e.target.value;
            if (val.length > 1) e.target.value = val.charAt(val.length - 1);
            calculateResult(true);
        });

        baseInputEl.addEventListener('blur', (e) => {
            if (!e.target.value.trim()) {
                e.target.value = '아';
                calculateResult(true);
            }
        });

        // --- 터치/마우스 드래그 이벤트 영역 ---
        container.addEventListener('pointerdown', (e) => {
            if (e.target.closest('input') || e.target.closest('button')) return;

            isDragging = true;
            wheelEl.classList.remove('spin-transition');

            if (document.activeElement === baseInputEl) baseInputEl.blur();

            const rect = container.getBoundingClientRect();
            centerX = rect.left + rect.width / 2;
            centerY = rect.top;

            lastPointerAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI);
            lastTickAngle = currentAngle;

            instruction.innerHTML = "👀 한 칸씩 천천히 확인해 보세요!";
            instruction.classList.remove('animate-bounce');
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDragging) return;

            let pointerAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI);
            let diff = pointerAngle - lastPointerAngle;

            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;

            currentAngle += diff;
            wheelEl.style.transform = `rotate(${currentAngle}deg)`;
            lastPointerAngle = pointerAngle;

            const tickThreshold = isMode14 ? 10 : 15;
            if (Math.abs(currentAngle - lastTickAngle) >= tickThreshold) {
                playTickSound();
                lastTickAngle = currentAngle;
            }

            calculateResult(false);
        });

        document.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;

            let targetAngle = Math.round(currentAngle / angleStep) * angleStep;
            wheelEl.classList.add('spin-transition');
            wheelEl.style.transform = `rotate(${targetAngle}deg)`;
            currentAngle = targetAngle;
            lastTickAngle = currentAngle;

            calculateResult(true);

            setTimeout(() => {
                instruction.innerHTML = "👆 룰렛을 잡고 살살 돌려보세요!<br><span class='text-2xl text-gray-500 font-medium'>(글자 입력칸을 터치하면 자판도 열려요)</span>";
            }, 150);
        });

        // --- 완성된 글자 유니코드 계산 함수 ---
        function calculateResult(isFinal = false) {
            let normalizedAngle = currentAngle % 360;

            let indexAtBottom = (-Math.round(normalizedAngle / angleStep)) % activeConsonants.length;
            if (indexAtBottom < 0) indexAtBottom += activeConsonants.length;

            const selConsonant = activeConsonants[indexAtBottom];
            const selBaseChar = baseInputEl.value || '아';
            const baseCode = selBaseChar.charCodeAt(0);

            if (baseCode >= 44032 && baseCode <= 55203) {
                const cleanBaseCode = baseCode - ((baseCode - 44032) % 28);
                finalCharResult = String.fromCharCode(cleanBaseCode + selConsonant.offset);
            } else {
                finalCharResult = '?';
            }

            if (resultBox.innerText !== finalCharResult) {
                resultBox.innerText = finalCharResult;
            }

            if (isFinal) {
                resultBoxContainer.classList.remove('animate-pop');
                void resultBoxContainer.offsetWidth;
                resultBoxContainer.classList.add('animate-pop');

                if (finalCharResult !== '?') {
                    soundHint.classList.replace('opacity-30', 'opacity-100');
                    resultBoxContainer.classList.remove('pointer-events-none');
                } else {
                    soundHint.classList.replace('opacity-100', 'opacity-30');
                    resultBoxContainer.classList.add('pointer-events-none');
                }
            } else {
                soundHint.classList.replace('opacity-100', 'opacity-30');
                resultBoxContainer.classList.add('pointer-events-none');
            }
        }

        // --- 고품질 아나운서 톤 TTS 출력 함수 ---
        function speakResult() {
            if (!finalCharResult || finalCharResult === '?') return;

            window.speechSynthesis.cancel();

            currentUtterance = new SpeechSynthesisUtterance(finalCharResult + ".");
            currentUtterance.lang = 'ko-KR';
            currentUtterance.rate = 0.85;
            currentUtterance.pitch = 1.0;

            if (availableVoices.length === 0) {
                availableVoices = window.speechSynthesis.getVoices();
            }

            if (availableVoices.length > 0) {
                let bestVoice = availableVoices.find(v => v.lang.includes('ko') && (v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Siri')));

                if (!bestVoice) {
                    bestVoice = availableVoices.find(v => v.lang.includes('ko'));
                }

                if (bestVoice) {
                    currentUtterance.voice = bestVoice;
                }
            }

            currentUtterance.onend = function () {
                currentUtterance = null;
            };
            currentUtterance.onerror = function () {
                currentUtterance = null;
            };

            window.speechSynthesis.speak(currentUtterance);
        }

        // 실행 시 초기 세팅
        initWheel();
    </script>
</body>

</html>
